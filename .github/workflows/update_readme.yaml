name: Update README with Latest Blog Posts

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow the workflow to push changes to the repository  

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

        # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4: Run the scripts
      - name: Fetch posts and update README
        run: python update_readme.py

      # Step 5: Commit and push IF anything changed
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update blog posts [skip ci]"
          git push
